name: nike_tc
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  zxcvbn: ^1.0.0
  url_launcher: ^6.3.1
  provider: ^6.1.2
  dio: ^5.7.0
  retrofit: ^4.9.2
  firebase_core: ^4.11.0
  firebase_analytics: ^12.4.3
  firebase_crashlytics: ^5.2.4
  firebase_auth: ^6.5.4
  firebase_remote_config: ^6.5.3
  webview_flutter: ^4.14.0
  connectivity_plus: ^7.2.0
  webview_flutter_wkwebview: ^3.26.0
  webview_flutter_android: ^4.13.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  retrofit_generator: ^10.2.7

flutter:
  uses-material-design: true
  assets:
   - assets/images/login_background.jpg
   - assets/images/login_background_2.jpg
   - assets/images/nike_logo.png
   - assets/images/nike.png

  fonts:
    - family: Oswald
      fonts:
        - asset: assets/fonts/Oswald-Regular.ttf
        - asset: assets/fonts/Oswald-Medium.ttf
          weight: 700

