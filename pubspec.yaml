name: nike_tc
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  zxcvbn: ^1.0.0
  url_launcher: ^6.3.1
  provider: ^6.1.2
  dio: ^5.7.0
  retrofit: ^4.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  retrofit_generator: ^10.2.7

flutter:
  uses-material-design: true
  assets:
   - assets/images/login_background.jpg
   - assets/images/login_background_2.jpg
   - assets/images/nike_logo.png
   - assets/images/nike.png

  fonts:
    - family: Oswald
      fonts:
        - asset: assets/fonts/Oswald-Regular.ttf
        - asset: assets/fonts/Oswald-Medium.ttf
          weight: 700

